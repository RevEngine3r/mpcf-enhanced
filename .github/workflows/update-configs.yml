name: Update Proxy Configs

on:
  schedule:
    - cron: '0 0 * * *'    # 03:30 Tehran
    - cron: '30 1 * * *'   # 05:00 Tehran
    - cron: '0 3 * * *'    # 06:30 Tehran
    - cron: '30 4 * * *'   # 08:00 Tehran
    - cron: '0 6 * * *'    # 09:30 Tehran
    - cron: '30 7 * * *'   # 11:00 Tehran
    - cron: '0 9 * * *'    # 12:30 Tehran
    - cron: '30 10 * * *'  # 14:00 Tehran
    - cron: '0 12 * * *'   # 15:30 Tehran
    - cron: '30 13 * * *'  # 17:00 Tehran
    - cron: '0 15 * * *'   # 18:30 Tehran
    - cron: '30 16 * * *'  # 20:00 Tehran
    - cron: '0 18 * * *'   # 21:30 Tehran
    - cron: '30 19 * * *'  # 23:00 Tehran
    - cron: '0 21 * * *'   # 00:30 Tehran
    - cron: '30 22 * * *'  # 02:00 Tehran
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Xray
        run: |
          MAX_RETRIES=3
          RETRY_COUNT=0

          install_xray() {
            LATEST_URL=$(curl -sL "https://api.github.com/repos/XTLS/Xray-core/releases/latest" \
              | jq -r '.assets[] | select(.name=="Xray-linux-64.zip") | .browser_download_url')

            [ -z "$LATEST_URL" ] || [ "$LATEST_URL" = "null" ] && return 1

            wget -q --timeout=30 --tries=3 -O xray.zip "$LATEST_URL" || return 1
            [ -s xray.zip ] || return 1
            unzip -o xray.zip xray || return 1
            sudo mv xray /usr/local/bin/ && sudo chmod +x /usr/local/bin/xray
            xray version || return 1
            rm -f xray.zip geoip.dat geosite.dat LICENSE
            return 0
          }

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            install_xray && echo "✓ Xray ready" && exit 0
            RETRY_COUNT=$((RETRY_COUNT + 1))
            [ $RETRY_COUNT -lt $MAX_RETRIES ] && sleep 20
          done

          # Fallback to pinned version
          FALLBACK="https://github.com/XTLS/Xray-core/releases/download/v25.1.1/Xray-linux-64.zip"
          wget -q --timeout=30 --tries=3 -O xray.zip "$FALLBACK" \
            && unzip -o xray.zip xray \
            && sudo mv xray /usr/local/bin/ \
            && sudo chmod +x /usr/local/bin/xray \
            && xray version \
            && rm -f xray.zip geoip.dat geosite.dat LICENSE \
            && echo "✓ Xray ready (fallback)" \
            || { echo "✗ Xray install failed"; exit 1; }

      - name: Create output directories
        run: mkdir -p configs assets

      # -----------------------------------------------------------------
      # Step 1: Fetch raw proxies from all sources
      # -----------------------------------------------------------------
      - name: Fetch proxy configs
        run: python src/fetch_configs.py
        continue-on-error: true

      # -----------------------------------------------------------------
      # Step 2: Enrich with geolocation + rename with flags/country codes
      # -----------------------------------------------------------------
      - name: Enrich with location data
        run: python src/enrich_configs.py configs/proxy_configs.txt configs/location_cache.json
        continue-on-error: true

      - name: Rename configs with country flags
        run: python src/rename_configs.py configs/location_cache.json configs/proxy_configs.txt configs/proxy_configs.txt
        continue-on-error: true

      # -----------------------------------------------------------------
      # Step 3: Single-pass test + Google-200 split -> 5 output files
      # -----------------------------------------------------------------
      - name: Run unified tester (xray + google-200 check)
        run: python src/unified_tester.py configs/proxy_configs.txt
        continue-on-error: true

      # -----------------------------------------------------------------
      # Step 4: Charts / reports
      # -----------------------------------------------------------------
      - name: Generate charts and reports
        run: python src/generate_charts.py
        continue-on-error: true

      # -----------------------------------------------------------------
      # Step 5: Update README cache-bust timestamps
      # -----------------------------------------------------------------
      - name: Update README timestamps
        run: |
          TS=$(date +%s)
          for f in README.md README_FA.md README_CN.md README_RU.md; do
            [ -f "$f" ] || continue
            sed -i "s/channel_stats_chart\.svg?v=[0-9]*/channel_stats_chart.svg?v=$TS/" "$f"
            sed -i "s/performance_report\.html?v=[0-9]*/performance_report.html?v=$TS/" "$f"
          done

      # -----------------------------------------------------------------
      # Step 6: Commit + push
      # -----------------------------------------------------------------
      - name: Commit and push
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add -f configs/all_working.txt         || true
          git add -f configs/google_200.txt          || true
          git add -f configs/hiddify_all_working.txt || true
          git add -f configs/hiddify_google_200.txt  || true
          git add -f configs/hiddify_all_detour.txt  || true
          git add    configs/proxy_configs.txt       || true
          git add    configs/location_cache.json     || true
          git add    configs/channel_stats.json      || true
          git add    assets/                         || true
          git add    README.md README_FA.md README_CN.md README_RU.md || true

          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "chore: update proxy configs [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          RETRIES=5; N=0
          while [ $N -lt $RETRIES ]; do
            git push && echo "✓ pushed" && exit 0
            N=$((N+1))
            [ $N -lt $RETRIES ] && sleep 20 && git pull --rebase origin main || true
          done
          echo "✗ push failed after $RETRIES attempts" && exit 1
